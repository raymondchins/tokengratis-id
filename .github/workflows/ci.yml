name: ci

# Runs on every PR + push to main. Mirrors the local gate (npm test + typecheck
# + build). Fully offline — needs no secrets, so it's safe for forked-PR runs.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pipeline self-tests
        run: npm test

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
