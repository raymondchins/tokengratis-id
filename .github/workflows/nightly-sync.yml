name: nightly-data-sync

# Pipeline aggregator tokengratis.id (PRD §8). Tiap malam re-fetch 4 sumber
# paralel (mnfst JSON + freellm.net HTML + cheahjs README + openrouter live API),
# gap-fill context/maxOutput dari models.dev, normalize via scripts/sync.mjs,
# commit hasilnya → push ke main → Vercel auto-deploy (rebuild fresh).
# Maintenance ~nol. LLM fallback (Claude Haiku) re-parse sumber unstructured
# yang drift kalau ANTHROPIC_API_KEY di-set sebagai repo secret.
# Bisa di-trigger manual ("Run workflow").
#
# sync.mjs nge-stamp `syncedAt` tiap run, jadi normalnya ADA diff tiap malam →
# commit + rebuild harian. Itu disengaja: "Synced [tanggal]" maju tiap malam =
# sinyal liveness/fresh (PRD §2 trust dari transparansi). Saat sumber mnfst
# memang berubah, perubahan kontennya ikut ke-commit di run yang sama.
#
# Safety: snapshot-diff guard di sync.mjs exit 1 kalau provider hilang atau
# model count collapse vs data terakhir yang di-commit → step push ga jalan,
# last-known-good tetap live. Guard `git diff --cached` cuma nge-skip kasus
# byte-identik yang langka.
#
# Manual override: kalau sumber memang sengaja hapus provider / shrink data,
# trigger "Run workflow" dengan `allow_data_shrink = true` buat bypass guard.
# Cron run (scheduled) SELALU pakai guard ON — default aman.

on:
  schedule:
    - cron: "0 19 * * *" # 02:00 WIB (UTC+7) tiap malam
  workflow_dispatch:
    inputs:
      allow_data_shrink:
        type: boolean
        default: false
        description: "Bypass data-shrink guard untuk perubahan sumber yang disengaja"

permissions:
  contents: write
  issues: write

concurrency:
  group: nightly-data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Sync data dari sumber komunitas
        id: sync
        env:
          # Cron run: inputs kosong → ALLOW_DATA_SHRINK="" → guard ON (aman).
          # Manual run dengan allow_data_shrink=true → ALLOW_DATA_SHRINK="1" → guard bypass.
          ALLOW_DATA_SHRINK: ${{ inputs.allow_data_shrink && '1' || '' }}
          # LLM fallback (scripts/lib/llm-fallback.mjs) cuma aktif kalau salah satu auth ada:
          # ANTHROPIC_API_KEY → raw Anthropic API (billing per-token).
          # CLAUDE_CODE_OAUTH_TOKEN → headless Claude Code via `npx @anthropic-ai/claude-code -p`
          #   (pakai kuota subscription Max, BUKAN API billing). Set via `claude setup-token`.
          # Kalau dua-duanya ga di-set → fallback OFF (sync jalan normal).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: node scripts/sync.mjs

      - name: Test pipeline self-tests
        run: npm test

      - name: Build (gate — pastiin data baru ke-render)
        run: npm run build

      - name: Commit + push kalau sumber berubah
        run: |
          # data/ (bukan cuma providers.json) supaya data/source-baselines.json
          # ikut ke-commit (rolling baseline last-known-good).
          git add data/ public/logos
          if git diff --cached --quiet; then
            echo "Sumber ga berubah — skip commit (no rebuild)."
          else
            git config user.name "tokengratis-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(data): nightly sync (mnfst + freellm + cheahjs + openrouter)"
            git pull --rebase origin main
            git push
            echo "Data berubah — pushed, Vercel akan rebuild."
          fi

      - name: Buka / update issue kalau sync gagal
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'sync-failure';
            const title = '⚠️ Nightly data sync failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Run gagal: ${runUrl}\n\nLast-known-good masih live — data lama belum ke-overwrite.\nCek output guard di log run untuk detail (provider hilang / model count collapse).\n\nTutup issue ini setelah root cause diatasi.`;

            // Pastikan label ada dulu
            try {
              await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label });
            } catch {
              await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label, color: 'd93f0b' });
            }

            // Cek apakah sudah ada open issue dengan label ini
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
              per_page: 1,
            });

            if (existing.data.length > 0) {
              // Tambah komentar ke issue yang ada — hindari spam duplikat
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Run baru juga gagal: ${runUrl}`,
              });
              console.log(`Komentar ditambahkan ke issue #${existing.data[0].number}`);
            } else {
              // Buat issue baru
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label],
              });
              console.log(`Issue baru dibuat: ${issue.data.html_url}`);
            }
